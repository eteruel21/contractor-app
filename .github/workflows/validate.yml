name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_ADMIN_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
      DATABASE_NAME: contractor_ci
      CONTRACTOR_MIGRATOR_PASSWORD: migrator_ci_password
      CONTRACTOR_API_PASSWORD: api_ci_password
      MIGRATOR_DATABASE_URL: postgresql://contractor_migrator:migrator_ci_password@127.0.0.1:5432/contractor_ci
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/contractor_ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck API
        run: npm run typecheck -w apps/api

      - name: Build API
        run: npm run build -w apps/api

      - name: Test invoice API contracts
        run: npm run test:api

      - name: Test database tooling
        run: npm run test:database-tools

      - name: Create and migrate test database
        run: |
          npm run db:bootstrap
          npm run db:migrate

      - name: Test invoice financial lifecycle
        run: npm run test:invoice-db

      - name: Build admin web
        run: npm run build -w apps/admin-web

      - name: Typecheck mobile
        run: npx tsc --noEmit -p apps/mobile/tsconfig.json
