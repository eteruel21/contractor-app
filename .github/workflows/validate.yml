name: Validate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Codebase & Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18.4-bookworm
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PGHOST: 127.0.0.1
      PGPORT: 5432
      PGDATABASE: contractor_ci
      PGUSER: postgres
      PGPASSWORD: postgres
      JWT_SECRET: "ci_jwt_secret_key_at_least_43_characters_long_for_testing_purposes"
      DATABASE_ADMIN_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
      DATABASE_NAME: contractor_ci
      CONTRACTOR_MIGRATOR_PASSWORD: migrator_ci_password
      CONTRACTOR_API_PASSWORD: api_ci_password
      MIGRATOR_DATABASE_URL: postgresql://contractor_migrator:migrator_ci_password@127.0.0.1:5432/contractor_ci
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/contractor_ci

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 3. Install dependencies
        run: |
          npm ci || npm install
          npm install @rollup/rollup-linux-x64-gnu -w apps/admin-web --no-save

      - name: 4. Typecheck all workspaces
        run: npm run typecheck

      - name: 5. Create roles & database (db:bootstrap)
        run: npm run db:bootstrap

      - name: 6. Apply database migrations (db:migrate)
        run: npm run db:migrate

      - name: 7. Seed test catalog data (db:seed)
        run: npm run db:seed

      - name: 8. Execute API, RLS and auth tests
        run: npm run test:api

      - name: 9. Execute database tooling tests
        run: npm run test:database-tools

      - name: 10. Execute invoice financial lifecycle tests
        run: npm run test:invoice-db

      - name: 11. Build API backend
        run: npm run build:api

      - name: 12. Test mobile app
        run: npm run test -w apps/mobile

      - name: 13. Build admin web application
        run: npm run build:admin

      - name: 14. Build mobile web application
        run: npm run build:mobile
