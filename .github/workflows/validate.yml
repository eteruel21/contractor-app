name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck API
        run: npm run typecheck -w apps/api

      - name: Build API
        run: npm run build -w apps/api

      - name: Build admin web
        run: npm run build -w apps/admin-web

      - name: Typecheck mobile
        run: npx tsc --noEmit -p apps/mobile/tsconfig.json